name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      # actions/setup-java@v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17

      - name: Verify required secrets
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::EXPO_PUBLIC_SUPABASE_URL e EXPO_PUBLIC_SUPABASE_ANON_KEY precisam estar configurados em Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          mv android/app/build/outputs/apk/release/app-release.apk ssma-v${VERSION}.apk

      # actions/upload-artifact@v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ssma-apk
          path: ssma-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        # softprops/action-gh-release@v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: ssma-*.apk
          generate_release_notes: true
